<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Magic Lock Screen</title>
    
    <style>
        /* --- ส่วนที่ 1: CSS (แต่งหน้าจอและทำเอฟเฟกต์ไฟกระพริบ) --- */
        body {
          margin: 0;
          padding: 0;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          background-color: #000;
          color: #fff;
          overflow: hidden;
          user-select: none;
          -webkit-user-select: none;
        }

        .lock-screen {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background: linear-gradient(to bottom, #1a1a2e, #16213e);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 2;
        }

        .title {
          font-size: 22px;
          margin-bottom: 50px;
          letter-spacing: 1px;
          font-weight: 400;
        }

        .keypad {
          display: grid;
          grid-template-columns: repeat(3, 85px);
          grid-gap: 25px;
          justify-content: center;
        }

        .key {
          width: 85px;
          height: 85px;
          border-radius: 50%;
          background-color: rgba(255, 255, 255, 0.11);
          border: none;
          color: #fff;
          font-size: 32px;
          cursor: pointer;
          transition: background-color 0.1s;
          outline: none;
          -webkit-tap-highlight-color: transparent; /* ลบกรอบสีฟ้าเวลาจิ้มบนมือถือ */
        }

        /* ช็อตโกงตา: นิ้วจิ้มปุ่มปุ๊บ ไฟกระพริบสว่างขึ้นทันทีตามจังหวะนิ้วจริง */
        .key:active {
          background-color: rgba(255, 255, 255, 0.4);
        }

        .home-screen {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background: #0f3460;
          display: flex;
          align-items: center;
          justify-content: center;
          text-align: center;
          z-index: 1;
        }
        
        .home-content h2 {
          font-size: 28px;
          margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="lock-screen" id="lockScreen">
      <div class="title">ป้อนรหัสผ่าน</div>
      
      <div class="keypad">
        <button class="key" onclick="pressKey()">1</button>
        <button class="key" onclick="pressKey()">2</button>
        <button class="key" onclick="pressKey()">3</button>
        <button class="key" onclick="pressKey()">4</button>
        <button class="key" onclick="pressKey()">5</button>
        <button class="key" onclick="pressKey()">6</button>
        <button class="key" onclick="pressKey()">7</button>
        <button class="key" onclick="pressKey()">8</button>
        <button class="key" onclick="pressKey()">9</button>
        <div></div>
        <button class="key" onclick="pressKey()">0</button>
        <div></div>
      </div>
    </div>

    <div class="home-screen" id="homeScreen">
      <div class="home-content">
        <h2>🔓 ปลดล็อกสำเร็จ!</h2>
        <p>ยินดีด้วย คุณเจาะรหัสผ่านได้แล้ว 55555</p>
      </div>
    </div>

    <script>
        let count = 0;
        const maxDigits = 6; // ใครมากดมั่วซั่วครบ 6 ครั้ง ปลดล็อกให้ทันที!

        function pressKey() {
          count++;
          if (count === maxDigits) {
            document.getElementById('lockScreen').style.display = 'none';
            count = 0; // รีเซ็ตตัวนับ
          }
        }
    </script>
</body>
</html>
